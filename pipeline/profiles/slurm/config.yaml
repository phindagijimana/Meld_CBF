# Snakemake SLURM profile (Snakemake >= 8 executor plugin).
#   meldcbf run --profile slurm
# Requires: pip install snakemake-executor-plugin-slurm
executor: slurm
jobs: 16                 # max concurrently-queued jobs
printshellcmds: True
rerun-incomplete: True
restart-times: 1
latency-wait: 60

# Cluster-wide defaults; override per rule below.
default-resources:
  mem_mb: 8000
  runtime: 120           # minutes
  cpus_per_task: 1
  slurm_partition: "general"
  # slurm_account: "your_account"   # this cluster requires no account

# Per-rule resources (mirror config.yaml: resources:). MELD is the heavy one.
set-resources:
  meld:
    mem_mb: 64000
    cpus_per_task: 8
    runtime: 1440
  register:
    mem_mb: 16000
    cpus_per_task: 2
    runtime: 120
  visualize:
    mem_mb: 8000
    runtime: 30
